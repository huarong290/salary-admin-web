<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>salary-admin-web</title>
    <script>
      (function () {
        try {
          // 1. 瞬间恢复暗黑模式
          var isDark = localStorage.getItem('theme-dark') === 'true';
          if (isDark) {
            document.documentElement.classList.add('dark');
          }
          // 2. 瞬间恢复主题主色调
          var primary = localStorage.getItem('theme-primary');
          if (primary) {
            document.documentElement.style.setProperty('--el-color-primary', primary);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
